name: Docker Build and Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - global/app/backstage/**

permissions:
  contents: read
  packages: write

jobs:
  build-and-test-docker-image:
    name: Build and Test Docker Image
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    steps:
      # Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@v4.1.1

      # Setup Node
      # https://github.com/marketplace/actions/setup-node-js-environment

      - name: Setup Node
        uses: actions/setup-node@v4.0.1
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Yarn install
        working-directory: global/app/backstage
        run: |
          yarn install --frozen-lockfile
          yarn tsc
          yarn build:backend --config ../../app-config.yaml

      # Docker Buildx
      # https://github.com/marketplace/actions/docker-setup-buildx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      # Docker Login
      # https://github.com/marketplace/actions/docker-login

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Test Docker images
      # https://github.com/marketplace/actions/build-and-push-docker-images

      - name: Build Docker Image
        uses: docker/build-push-action@v5.1.0
        with:
          context: './global/app/backstage'
          file: './global/app/backstage/packages/backend/Dockerfile'
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: |
            ghcr.io/osinfra-io/backstage:test

      - name: Test Docker Image
        run: |
          docker run --rm ghcr.io/osinfra-io/ubuntu:test
